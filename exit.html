<!--
PAGINA: Uitgang
DOEL: Eindscherm van route met link om opnieuw te starten vanaf index.
ROL IN DE FLOW: Eindpunt na spelroute; navigeert terug naar index.html voor nieuwe sessie.
PUZZELREGELS (indien van toepassing): - Geen puzzel; - Validatie: n.v.t.; - Succes: n.v.t.; - Falen: n.v.t.
EFFECTEN:
- Animaties: decoratieve sterren en vuurwerklaag op de achtergrond.
- Geluid: geen.
- Visuele effecten: achtergrondbeeld, beloningsafbeelding en feestanimatie.
- Timers of dynamische veranderingen: toont behaalde eindtijd in het tekstkader.
GEBRUIKTE MEDIA:
- Afbeeldingen: assets/images/toverstok.png, assets/images/magischebeloning.png.
- Audio: geen.
- Video: geen.
- Externe assets: geen.
BIJZONDERHEDEN:
- Afhankelijkheden: leest opgeslagen timerstate en finish-tijd uit browseropslag.
- Globale state impact: gebruikt opgeslagen timerinformatie voor weergave van behaalde tijd.
- Edge cases of technische aandachtspunten: toont "onbekend" als timerdata of finish-tijd ontbreekt.
-->
<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Ban Vebroken!</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: url("assets/images/toverstok.png") center center / cover no-repeat fixed;
      color: #eff3f8;
      font-family: "Cormorant Garamond", "Times New Roman", serif;
    }

    main {
      position: relative;
      z-index: 2;
      text-align: center;
      width: min(820px, calc(100vw - 32px));
      margin-top: 0;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
    }

    .celebration-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .content-panel {
      margin-top: 4px;
      padding: 24px;
      border: 1px solid rgba(212, 179, 106, 0.4);
      border-radius: 18px;
      background: rgba(11, 17, 26, 0.55);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
    }

    .reward-image {
      display: block;
      width: auto;
      max-width: 100%;
      margin: 10vh auto 0;
      object-fit: contain;
      filter: drop-shadow(0 20px 36px rgba(0, 0, 0, 0.4));
    }

    a {
      color: #d4b36a;
      font-weight: 700;
      text-decoration: none;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.4vw, 2.2rem);
      color: #f7ead2;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.6;
      font-size: clamp(0.95rem, 1.3vw, 1.05rem);
      color: #e6ddc8;
    }

    .time-result {
      color: #f7ead2;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <canvas class="celebration-layer" id="celebrationLayer" aria-hidden="true"></canvas>
  <main>
    <img class="reward-image" src="assets/images/magischebeloning.png" alt="Magische beloning" />
    <section class="content-panel">
      <h1>Gefeliciteerd!</h1>
      <p>Je hebt de ban van het tijdsglas verbroken en zichtbaar gemaakt wat aan het oog onttrokken was.<br>Onthoud deze woorden: VITREA TEMPORA CONFRINGO REVELIO</p>
      <p class="time-result" id="timeResult">Behaalde tijd: --:--</p>
      <p><a href="index.html">Opnieuw starten</a></p>
    </section>
  </main>
  <script>
    (function () {
      const STORAGE_KEY = "hp_escape_timer_v1";
      const FINISH_STORAGE_KEY = "hp_escape_finished_elapsed_ms_v1";
      const WINDOW_NAME_KEY = "__hp_escape_timer_v1__";
      const timeResult = document.getElementById("timeResult");
      const celebrationLayer = document.getElementById("celebrationLayer");

      function readWindowNameBag() {
        try {
          const raw = window.name || "";
          if (!raw) {
            return {};
          }
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      function readRawState() {
        try {
          const sessionRaw = sessionStorage.getItem(STORAGE_KEY);
          if (sessionRaw) {
            return sessionRaw;
          }
        } catch (_) {}

        try {
          const localRaw = localStorage.getItem(STORAGE_KEY);
          if (localRaw) {
            return localRaw;
          }
        } catch (_) {}

        const bag = readWindowNameBag();
        return typeof bag[WINDOW_NAME_KEY] === "string" ? bag[WINDOW_NAME_KEY] : null;
      }

      function readState() {
        try {
          const raw = readRawState();
          if (!raw) {
            return null;
          }
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.startedAt) {
            return null;
          }
          return parsed;
        } catch (_) {
          return null;
        }
      }

      function formatMs(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      }

      function readFinishedElapsedMs() {
        try {
          const sessionValue = sessionStorage.getItem(FINISH_STORAGE_KEY);
          if (sessionValue) {
            return Number(sessionValue);
          }
        } catch (_) {}

        try {
          const localValue = localStorage.getItem(FINISH_STORAGE_KEY);
          if (localValue) {
            return Number(localValue);
          }
        } catch (_) {}

        return null;
      }

      const state = readState();
      const finishedElapsedMs = readFinishedElapsedMs();
      if (!state || !Number.isFinite(finishedElapsedMs)) {
        timeResult.textContent = "Behaalde tijd: onbekend";
        return;
      }

      timeResult.textContent = "Behaalde tijd: " + formatMs(finishedElapsedMs);
    })();

    (function () {
      const canvas = document.getElementById("celebrationLayer");
      const ctx = canvas.getContext("2d");
      const stars = [];
      const floatingStars = [];
      const particles = [];
      let width = 0;
      let height = 0;
      let lastBurstAt = 0;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function createStars() {
        stars.length = 0;
        for (let i = 0; i < 70; i += 1) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: randomBetween(1, 3.4),
            alpha: randomBetween(0.2, 0.9),
            pulse: randomBetween(0.4, 1.2),
            drift: randomBetween(-0.06, 0.06)
          });
        }
      }

      function spawnFloatingStar() {
        floatingStars.push({
          x: randomBetween(width * 0.08, width * 0.92),
          y: randomBetween(height * 0.08, height * 0.82),
          radius: randomBetween(3, 10),
          alpha: 0,
          life: 0,
          maxLife: randomBetween(140, 240),
          fadeIn: randomBetween(20, 40),
          fadeOut: randomBetween(36, 60),
          driftX: randomBetween(-0.08, 0.08),
          driftY: randomBetween(-0.18, -0.04),
          hue: Math.random() > 0.5 ? "255,236,182" : "184,229,255"
        });
      }

      function drawStarShape(x, y, radius, color, alpha) {
        const spikes = 5;
        const innerRadius = radius * 0.45;
        let rotation = Math.PI / 2 * 3;
        const step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(x, y - radius);
        for (let i = 0; i < spikes; i += 1) {
          ctx.lineTo(x + Math.cos(rotation) * radius, y + Math.sin(rotation) * radius);
          rotation += step;
          ctx.lineTo(x + Math.cos(rotation) * innerRadius, y + Math.sin(rotation) * innerRadius);
          rotation += step;
        }
        ctx.lineTo(x, y - radius);
        ctx.closePath();
        ctx.fillStyle = "rgba(" + color + ", " + alpha + ")";
        ctx.fill();
      }

      function burstFirework(x, y) {
        const palette = [
          "255,220,150",
          "150,230,255",
          "255,180,210",
          "194,255,203",
          "255,245,190"
        ];
        const count = 36;
        const color = palette[Math.floor(Math.random() * palette.length)];
        for (let i = 0; i < count; i += 1) {
          const angle = (Math.PI * 2 * i) / count + randomBetween(-0.08, 0.08);
          const speed = randomBetween(1.2, 3.8);
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: randomBetween(45, 85),
            maxLife: 85,
            size: randomBetween(1.6, 3.8),
            color
          });
        }
      }

      function updateAndDraw() {
        ctx.clearRect(0, 0, width, height);

        const now = performance.now();
        if (now - lastBurstAt > 900) {
          burstFirework(randomBetween(width * 0.12, width * 0.88), randomBetween(height * 0.14, height * 0.58));
          lastBurstAt = now;
        }

        if (floatingStars.length < 12 && Math.random() < 0.08) {
          spawnFloatingStar();
        }

        for (const star of stars) {
          star.y += star.drift;
          if (star.y < 0) {
            star.y = height;
          } else if (star.y > height) {
            star.y = 0;
          }
          const glow = 0.55 + Math.sin(now * 0.0015 * star.pulse + star.x) * 0.25;
          ctx.beginPath();
          ctx.fillStyle = "rgba(255, 238, 190, " + Math.max(0.12, star.alpha * glow) + ")";
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const particle = particles[i];
          particle.x += particle.vx;
          particle.y += particle.vy;
          particle.vy += 0.018;
          particle.vx *= 0.992;
          particle.life -= 1;

          const alpha = Math.max(0, particle.life / particle.maxLife);
          ctx.beginPath();
          ctx.fillStyle = "rgba(" + particle.color + ", " + alpha + ")";
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();

          if (particle.life <= 0) {
            particles.splice(i, 1);
          }
        }

        for (let i = floatingStars.length - 1; i >= 0; i -= 1) {
          const star = floatingStars[i];
          star.life += 1;
          star.x += star.driftX;
          star.y += star.driftY;

          if (star.life < star.fadeIn) {
            star.alpha = star.life / star.fadeIn;
          } else if (star.life > star.maxLife - star.fadeOut) {
            star.alpha = Math.max(0, (star.maxLife - star.life) / star.fadeOut);
          } else {
            star.alpha = 1;
          }

          ctx.save();
          ctx.shadowBlur = 20;
          ctx.shadowColor = "rgba(" + star.hue + ", " + Math.max(0.12, star.alpha) + ")";
          drawStarShape(star.x, star.y, star.radius, star.hue, star.alpha * 0.9);
          ctx.restore();

          if (star.life >= star.maxLife) {
            floatingStars.splice(i, 1);
          }
        }

        requestAnimationFrame(updateAndDraw);
      }

      resize();
      createStars();
      window.addEventListener("resize", () => {
        resize();
        createStars();
      });
      requestAnimationFrame(updateAndDraw);
    })();
  </script>
</body>
</html>
